<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Derei Assistant</title>
    <link rel="stylesheet" href="/static/design-system.css" />
    <style>
      /* ═══════════════════════════════════════════════════════════════════════
         NEW RESPONSIVE THREE-COLUMN LAYOUT
         ═══════════════════════════════════════════════════════════════════════ */

      /* Login Screen */
      .auth-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }

      .auth-screen.hidden {
        display: none;
      }

      .auth-container {
        background: var(--surface);
        border: var(--border-w) solid var(--border);
        border-radius: 4px;
        padding: var(--sp-10);
        max-width: 380px;
        width: 100%;
        box-shadow: var(--shadow-sm);
      }

      .auth-container h1 {
        font-size: var(--text-xl);
        margin-bottom: var(--sp-4);
        text-align: center;
      }

      .auth-form {
        display: flex;
        flex-direction: column;
        gap: var(--sp-4);
      }

      .auth-form input {
        padding: var(--sp-3);
        border: var(--border-w) solid var(--border);
        background: var(--surface);
        font-size: var(--text-base);
        border-radius: 0;
      }

      .auth-form input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .auth-buttons {
        display: flex;
        gap: var(--sp-3);
      }

      .auth-buttons button {
        flex: 1;
        padding: var(--sp-3);
        border: var(--border-w) solid var(--border);
        background: var(--surface);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-weight: var(--fw-medium);
        text-transform: uppercase;
        font-size: var(--text-xs);
        letter-spacing: var(--ls-wide);
        transition: all var(--trans-base);
      }

      .auth-buttons button.primary {
        background: var(--accent);
        color: var(--text-inverse);
        border-color: var(--accent);
      }

      .auth-buttons button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .auth-buttons button.primary:hover {
        background: var(--accent-hover);
      }

      .auth-error {
        color: var(--error);
        font-size: var(--text-xs);
        margin-top: var(--sp-2);
      }

      /* MAIN APP LAYOUT */
      .app {
        display: grid;
        grid-template-columns: 220px 1fr 280px;
        grid-template-rows: 60px 1fr 120px;
        height: 100vh;
        gap: 0;
      }

      /* HEADER/TAB NAVIGATION */
      .app-header {
        grid-column: 1 / -1;
        background: var(--surface);
        border-bottom: var(--border-w) solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 var(--sp-4);
        gap: var(--sp-4);
        overflow-x: auto;
      }

      .tab-btn {
        padding: var(--sp-2) var(--sp-3);
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        font-size: var(--text-xs);
        text-transform: uppercase;
        letter-spacing: var(--ls-wide);
        color: var(--text-dim);
        transition: all var(--trans-base);
        white-space: nowrap;
      }

      .tab-btn:hover {
        color: var(--text);
      }

      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* LEFT SIDEBAR - CHAT HISTORY */
      .sidebar-left {
        grid-row: 2;
        grid-column: 1;
        background: var(--surface);
        border-right: var(--border-w) solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-left-header {
        padding: var(--sp-4);
        border-bottom: var(--border-w) solid var(--border);
      }

      .sidebar-left-header h2 {
        font-size: var(--text-base);
        margin-bottom: var(--sp-2);
      }

      .btn-new-chat {
        width: 100%;
        padding: var(--sp-2);
        background: var(--accent);
        color: var(--text-inverse);
        border: none;
        cursor: pointer;
        font-weight: var(--fw-medium);
        font-size: var(--text-xs);
        text-transform: uppercase;
        letter-spacing: var(--ls-wide);
        transition: all var(--trans-base);
      }

      .btn-new-chat:hover {
        background: var(--accent-hover);
      }

      .chats-list {
        flex: 1;
        overflow-y: auto;
        padding: var(--sp-2);
      }

      .chat-item {
        padding: var(--sp-2);
        margin-bottom: var(--sp-1);
        background: var(--surface-dim);
        border-left: 2px solid transparent;
        cursor: pointer;
        transition: all var(--trans-base);
        font-size: var(--text-xs);
      }

      .chat-item:hover {
        background: var(--bg);
        border-left-color: var(--accent);
      }

      .chat-item.active {
        background: var(--accent-tint);
        border-left-color: var(--accent);
      }

      .sidebar-left-footer {
        padding: var(--sp-3);
        border-top: var(--border-w) solid var(--border);
        display: flex;
        flex-direction: column;
        gap: var(--sp-2);
      }

      .sidebar-left-footer button {
        width: 100%;
        padding: var(--sp-2);
        font-size: var(--text-xs);
        border: var(--border-w) solid var(--border);
        background: var(--surface);
        cursor: pointer;
        transition: all var(--trans-base);
      }

      .sidebar-left-footer button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* CENTER - CONTENT AREA */
      .content-area {
        grid-row: 2;
        grid-column: 2;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Chat View */
      .chat-view {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .chat-messages-container {
        flex: 1;
        overflow-y: auto;
        padding: var(--sp-6);
      }

      .chat-messages {
        display: flex;
        flex-direction: column;
        gap: var(--sp-4);
      }

      .message {
        animation: slideIn 0.2s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
        max-width: 75%;
      }

      .message.assistant {
        align-self: flex-start;
        max-width: 85%;
      }

      .message-content {
        padding: var(--sp-4);
        background: var(--surface);
        border: var(--border-w) solid var(--border);
        word-wrap: break-word;
        white-space: pre-wrap;
        line-height: var(--lh-loose);
      }

      .message.user .message-content {
        background: var(--accent-tint);
        border-color: var(--accent);
      }

      .message-time {
        font-size: var(--text-xs);
        color: var(--text-dim);
        margin-top: var(--sp-2);
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-dim);
        text-align: center;
      }

      /* Other Views - Scrollable Content */
      .feature-view {
        display: none;
        flex-direction: column;
        overflow-y: auto;
        padding: var(--sp-6);
      }

      .feature-view.active {
        display: flex;
      }

      /* BOTTOM - CHAT INPUT */
      .chat-input-area {
        grid-row: 3;
        grid-column: 2;
        background: var(--surface);
        border-top: var(--border-w) solid var(--border);
        padding: var(--sp-4);
        display: flex;
        gap: var(--sp-3);
        align-items: flex-end;
      }

      .input-wrapper {
        flex: 1;
        display: flex;
        gap: var(--sp-2);
        align-items: flex-end;
      }

      .chat-input {
        flex: 1;
        padding: var(--sp-3);
        border: var(--border-w) solid var(--border);
        background: var(--surface-dim);
        font-family: "DM Sans", sans-serif;
        font-size: var(--text-base);
        resize: none;
        max-height: 80px;
        min-height: 40px;
        overflow-y: auto;
        white-space: pre-wrap;
      }

      .chat-input:focus {
        outline: none;
        border-color: var(--accent);
        background: var(--surface);
      }

      .btn-attach {
        padding: var(--sp-2);
        width: 40px;
        height: 40px;
        border: var(--border-w) solid var(--border);
        background: var(--surface);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--trans-base);
      }

      .btn-attach:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn-attach svg {
        width: 16px;
        height: 16px;
      }

      .chat-send {
        padding: var(--sp-2) var(--sp-4);
        background: var(--accent);
        color: var(--text-inverse);
        border: none;
        cursor: pointer;
        font-weight: var(--fw-medium);
        text-transform: uppercase;
        font-size: var(--text-xs);
        letter-spacing: var(--ls-wide);
        transition: all var(--trans-base);
        white-space: nowrap;
      }

      .chat-send:hover {
        background: var(--accent-hover);
      }

      /* RIGHT SIDEBAR - MODEL SELECTOR & OPTIONS */
      .sidebar-right {
        grid-row: 2;
        grid-column: 3;
        background: var(--surface);
        border-left: var(--border-w) solid var(--border);
        padding: var(--sp-4);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: var(--sp-6);
      }

      .sidebar-right h3 {
        font-size: var(--text-sm);
        text-transform: uppercase;
        letter-spacing: var(--ls-wide);
        margin-bottom: var(--sp-3);
      }

      .model-selector {
        display: flex;
        flex-direction: column;
        gap: var(--sp-3);
      }

      .model-label {
        font-size: var(--text-xs);
        text-transform: uppercase;
        letter-spacing: var(--ls-wide);
        color: var(--text-dim);
      }

      .model-select {
        padding: var(--sp-2);
        border: var(--border-w) solid var(--border);
        background: var(--surface);
        font-size: var(--text-sm);
        cursor: pointer;
      }

      .model-summary {
        font-size: var(--text-xs);
        color: var(--text-secondary);
        line-height: var(--lh-normal);
      }

      .voice-controls,
      .info-section {
        display: flex;
        flex-direction: column;
        gap: var(--sp-2);
      }

      .voice-btn,
      .info-btn {
        padding: var(--sp-2) var(--sp-3);
        border: var(--border-w) solid var(--border);
        background: var(--surface);
        cursor: pointer;
        font-size: var(--text-xs);
        text-transform: uppercase;
        letter-spacing: var(--ls-wide);
        transition: all var(--trans-base);
      }

      .voice-btn:hover,
      .info-btn:hover {
        border-color: var(--accent);
      }

      .voice-btn.active {
        background: var(--accent-tint);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* MODAL - Account Info */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9999;
        align-items: center;
        justify-content: center;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: var(--surface);
        border: var(--border-w) solid var(--border);
        border-radius: 4px;
        padding: var(--sp-8);
        max-width: 400px;
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.2);
      }

      .modal-content h2 {
        margin-bottom: var(--sp-4);
      }

      .modal-content p {
        margin-bottom: var(--sp-2);
        font-size: var(--text-sm);
      }

      .modal-close-btn {
        margin-top: var(--sp-4);
        padding: var(--sp-2) var(--sp-4);
        background: var(--accent);
        color: var(--text-inverse);
        border: none;
        cursor: pointer;
        width: 100%;
      }

      /* Feature Views */
      .form-group {
        display: flex;
        flex-direction: column;
        gap: var(--sp-2);
        margin-bottom: var(--sp-4);
      }

      .form-group label {
        font-size: var(--text-xs);
        text-transform: uppercase;
        letter-spacing: var(--ls-wide);
        color: var(--text-dim);
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        padding: var(--sp-3);
        border: var(--border-w) solid var(--border);
        background: var(--surface);
        font-size: var(--text-base);
        font-family: "DM Sans", sans-serif;
      }

      .todo-item,
      .note-item,
      .news-item {
        padding: var(--sp-3);
        background: var(--surface-dim);
        border: var(--border-w) solid var(--border);
        margin-bottom: var(--sp-2);
      }

      .todo-item button {
        margin-left: var(--sp-2);
        padding: var(--sp-1) var(--sp-2);
        font-size: var(--text-xs);
        background: var(--error);
        color: white;
        border: none;
        cursor: pointer;
      }

      .btn {
        padding: var(--sp-3);
        background: var(--accent);
        color: var(--text-inverse);
        border: none;
        cursor: pointer;
        font-weight: var(--fw-medium);
        text-transform: uppercase;
        font-size: var(--text-xs);
        letter-spacing: var(--ls-wide);
        margin-bottom: var(--sp-3);
      }

      .btn:hover {
        background: var(--accent-hover);
      }

      .btn.secondary {
        background: transparent;
        color: var(--text);
        border: var(--border-w) solid var(--border);
      }

      .btn.secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      @media (max-width: 1200px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar-left,
        .sidebar-right {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- LOGIN SCREEN -->
    <div class="auth-screen" id="authScreen">
      <div class="auth-container">
        <h1>Derei Assistant</h1>
        <div class="auth-form" id="loginForm">
          <input
            type="text"
            id="loginUsername"
            placeholder="Username"
            autocomplete="username"
          />
          <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            autocomplete="current-password"
          />
          <div class="auth-buttons">
            <button class="primary" onclick="handleLogin()">Login</button>
            <button onclick="switchToSignup()">Sign Up</button>
          </div>
          <div class="auth-error" id="authError"></div>
        </div>
        <div class="auth-form" id="signupForm" style="display: none">
          <input
            type="text"
            id="signupUsername"
            placeholder="Username"
            autocomplete="username"
          />
          <input
            type="email"
            id="signupEmail"
            placeholder="Email"
            autocomplete="email"
          />
          <input
            type="password"
            id="signupPassword"
            placeholder="Password (min. 6 chars)"
            autocomplete="new-password"
          />
          <div class="auth-buttons">
            <button class="primary" onclick="handleSignup()">
              Create Account
            </button>
            <button onclick="switchToLogin()">Back to Login</button>
          </div>
          <div class="auth-error" id="signupError"></div>
        </div>
      </div>
    </div>

    <!-- MAIN APP -->
    <div class="app" id="mainApp" style="display: none">
      <!-- HEADER/TABS -->
      <div class="app-header">
        <button class="tab-btn active" onclick="switchTab('chat')">
          💬 Chat
        </button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 Search</button>
        <button class="tab-btn" onclick="switchTab('todo')">✓ Todo</button>
        <button class="tab-btn" onclick="switchTab('notes')">📝 Notes</button>
        <button class="tab-btn" onclick="switchTab('medical')">
          ⚕️ Medical
        </button>
        <button class="tab-btn" onclick="switchTab('deca')">📚 DECA</button>
        <button class="tab-btn" onclick="switchTab('news')">📰 News</button>
      </div>

      <!-- LEFT SIDEBAR - CHAT HISTORY -->
      <aside class="sidebar-left">
        <div class="sidebar-left-header">
          <h2>Chats</h2>
          <button class="btn-new-chat" onclick="createNewChat()">
            + New Chat
          </button>
        </div>
        <div class="chats-list" id="chatsList"></div>
        <div class="sidebar-left-footer">
          <button onclick="showAccountInfo()">Account</button>
          <button onclick="handleLogout()">Logout</button>
        </div>
      </aside>

      <!-- CENTER - CONTENT AREA -->
      <div class="content-area">
        <!-- CHAT VIEW -->
        <div class="chat-view feature-view active" id="chatView">
          <div class="chat-messages-container">
            <div class="chat-messages" id="chatMessages">
              <div class="empty-state">
                <p>Start a conversation</p>
              </div>
            </div>
          </div>
        </div>

        <!-- SEARCH VIEW -->
        <div class="feature-view" id="searchView">
          <div class="form-group">
            <label>Search Query</label>
            <input
              type="text"
              id="searchQuery"
              placeholder="What would you like to search for?"
            />
            <button class="btn" onclick="performSearch()">Search</button>
          </div>
          <div id="searchResults"></div>
        </div>

        <!-- TODO VIEW -->
        <div class="feature-view" id="todoView">
          <div class="form-group">
            <label>Add Todo</label>
            <input
              type="text"
              id="todoInput"
              placeholder="What do you need to do?"
            />
            <button class="btn" onclick="addTodo()">Add Todo</button>
          </div>
          <div id="todoList"></div>
        </div>

        <!-- NOTES VIEW -->
        <div class="feature-view" id="notesView">
          <div class="form-group">
            <label>Note Title</label>
            <input type="text" id="noteTitle" placeholder="Note title..." />
            <label>Content</label>
            <textarea
              id="noteContent"
              placeholder="Write your note..."
              style="min-height: 200px; resize: vertical"
            ></textarea>
            <button class="btn" onclick="saveNote()">Save Note</button>
          </div>
          <div id="notesList"></div>
        </div>

        <!-- MEDICAL VIEW -->
        <div class="feature-view" id="medicalView">
          <div class="form-group">
            <label>Search Medical Condition</label>
            <input
              type="text"
              id="medicalQuery"
              placeholder="e.g., headache, fever..."
            />
            <button class="btn" onclick="lookupMedical()">Look Up</button>
          </div>
          <div id="medicalResults"></div>
        </div>

        <!-- DECA VIEW -->
        <div class="feature-view" id="decaView">
          <div class="form-group">
            <label>DECA Practice</label>
            <button class="btn" onclick="generateDeca()">
              Generate Question
            </button>
            <button class="btn secondary" onclick="loadDecaSample()">
              Load Sample
            </button>
          </div>
          <div id="decaContent"></div>
        </div>

        <!-- NEWS VIEW -->
        <div class="feature-view" id="newsView">
          <button class="btn" onclick="loadNews()">Load Latest News</button>
          <div id="newsList" style="margin-top: var(--sp-4)"></div>
        </div>
      </div>

      <!-- RIGHT SIDEBAR - MODEL SELECTOR -->
      <aside class="sidebar-right">
        <div>
          <h3>AI Model</h3>
          <div class="model-selector">
            <div class="model-label">Select Model:</div>
            <select
              id="chatModelSelect"
              class="model-select"
              onchange="updateModelInfo()"
            ></select>
            <div class="model-summary" id="chatModelSummary">
              Loading available models...
            </div>
          </div>
        </div>

        <div>
          <h3>Voice</h3>
          <div class="voice-controls">
            <button
              class="voice-btn"
              id="voiceInputBtn"
              onclick="toggleVoiceInput()"
            >
              🎤 Microphone
            </button>
            <button
              class="voice-btn active"
              id="voiceReplyToggle"
              onclick="toggleVoiceOutput()"
            >
              🔊 Voice Reply
            </button>
          </div>
          <div
            id="voiceStatus"
            style="font-size: var(--text-xs); color: var(--text-dim)"
          ></div>
        </div>

        <div class="info-section">
          <h3>Account</h3>
          <div
            id="accountInfo"
            style="font-size: var(--text-xs); margin-bottom: var(--sp-2)"
          >
            <p id="accountUsername"></p>
            <p id="accountChatCount"></p>
          </div>
        </div>
      </aside>

      <!-- CHAT INPUT (only visible in chat view) -->
      <div class="chat-input-area" id="chatInputArea">
        <div class="input-wrapper">
          <input
            type="file"
            id="fileInput"
            style="display: none"
            onchange="handleFileSelect(event)"
          />
          <button
            class="btn-attach"
            onclick="document.getElementById('fileInput').click()"
            title="Attach file"
          >
            <svg viewBox="0 0 16 16">
              <path
                d="M13 7l-5 5a3.5 3.5 0 01-5-5l5-5a2 2 0 013 3l-5 5a.5.5 0 01-1-1l4-4"
              />
            </svg>
          </button>
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Ask anything…"
            onkeydown="handleInputKeydown(event)"
          ></textarea>
        </div>
        <button class="chat-send" onclick="sendMessage()">Send</button>
      </div>
    </div>

    <!-- ACCOUNT INFO MODAL -->
    <div class="modal" id="accountModal">
      <div class="modal-content">
        <h2>Account Information</h2>
        <p><strong>Username:</strong> <span id="modalUsername"></span></p>
        <p><strong>Total Chats:</strong> <span id="modalChatCount"></span></p>
        <p><strong>Logged In:</strong> <span id="modalLoginTime"></span></p>
        <button class="modal-close-btn" onclick="closeAccountModal()">
          Close
        </button>
      </div>
    </div>

    <script>
      // ═══════════════════════════════════════════════════════════════════════
      // GLOBAL STATE
      // ═══════════════════════════════════════════════════════════════════════

      let currentUser = null;
      let currentChatId = null;
      let sessionToken = localStorage.getItem("sessionToken");
      let currentTab = "chat";
      let voiceReplyEnabled = true;
      let selectedModel = "llama-3.3-70b-versatile";
      let allModels = [];

      // ═══════════════════════════════════════════════════════════════════════
      // INITIALIZATION
      // ═══════════════════════════════════════════════════════════════════════

      window.addEventListener("load", () => {
        if (sessionToken) {
          verifySession();
        } else {
          showAuthScreen();
        }
      });

      async function verifySession() {
        try {
          const response = await fetch("/api/auth/verify", {
            headers: { Authorization: `Bearer ${sessionToken}` },
          });

          if (response.ok) {
            const data = await response.json();
            currentUser = data.user;
            showMainApp();
            loadChatsList();
            loadAvailableModels();
            updateAccountInfo();
          } else {
            sessionToken = null;
            localStorage.removeItem("sessionToken");
            showAuthScreen();
          }
        } catch (error) {
          console.error("Session verification failed:", error);
          showAuthScreen();
        }
      }

      async function loadAvailableModels() {
        try {
          const response = await fetch("/api/groq-models");
          if (response.ok) {
            const data = await response.json();
            allModels = data.models || [];
            const select = document.getElementById("chatModelSelect");
            select.innerHTML = "";

            allModels.forEach((model) => {
              const option = document.createElement("option");
              option.value = model.id;
              option.textContent = model.friendly_name || model.id;
              select.appendChild(option);
            });

            if (select.options.length > 0) {
              select.value = selectedModel;
              updateModelInfo();
            }
          }
        } catch (error) {
          console.error("Error loading models:", error);
          document.getElementById("chatModelSummary").textContent =
            "Unable to load models";
        }
      }

      function updateModelInfo() {
        selectedModel = document.getElementById("chatModelSelect").value;
        const model = allModels.find((m) => m.id === selectedModel);

        if (model) {
          document.getElementById("chatModelSummary").textContent =
            model.description || "No description available";
        }
      }

      function updateAccountInfo() {
        if (currentUser) {
          document.getElementById("accountUsername").textContent =
            `User: ${currentUser.username}`;
          document.getElementById("accountChatCount").textContent =
            `${currentUser.chats?.length || 0} chats`;
        }
      }

      // ═══════════════════════════════════════════════════════════════════════
      // AUTHENTICATION
      // ═══════════════════════════════════════════════════════════════════════

      function switchToSignup() {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("signupForm").style.display = "flex";
        document.getElementById("authError").textContent = "";
        document.getElementById("signupError").textContent = "";
      }

      function switchToLogin() {
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginForm").style.display = "flex";
        document.getElementById("authError").textContent = "";
        document.getElementById("signupError").textContent = "";
      }

      async function handleLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;

        if (!username || !password) {
          document.getElementById("authError").textContent =
            "Please enter username and password";
          return;
        }

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            document.getElementById("authError").textContent =
              data.error || "Login failed";
            return;
          }

          sessionToken = data.session_token;
          localStorage.setItem("sessionToken", sessionToken);
          currentUser = { username };

          showMainApp();
          loadChatsList();
          loadAvailableModels();
          updateAccountInfo();
        } catch (error) {
          document.getElementById("authError").textContent = "Connection error";
          console.error("Login error:", error);
        }
      }

      async function handleSignup() {
        const username = document.getElementById("signupUsername").value.trim();
        const email = document.getElementById("signupEmail").value.trim();
        const password = document.getElementById("signupPassword").value;

        if (!username || !email || !password) {
          document.getElementById("signupError").textContent =
            "Please fill in all fields";
          return;
        }

        try {
          const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            document.getElementById("signupError").textContent =
              data.error || "Signup failed";
            return;
          }

          document.getElementById("signupUsername").value = "";
          document.getElementById("signupEmail").value = "";
          document.getElementById("signupPassword").value = "";

          await handleLogin();
        } catch (error) {
          document.getElementById("signupError").textContent =
            "Connection error";
          console.error("Signup error:", error);
        }
      }

      async function handleLogout() {
        if (!confirm("Are you sure you want to logout?")) return;

        try {
          await fetch("/api/auth/logout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_token: sessionToken }),
          });
        } catch (error) {
          console.error("Logout error:", error);
        }

        sessionToken = null;
        localStorage.removeItem("sessionToken");
        currentUser = null;
        currentChatId = null;
        showAuthScreen();
      }

      // ═══════════════════════════════════════════════════════════════════════
      // UI MANAGEMENT
      // ═══════════════════════════════════════════════════════════════════════

      function showAuthScreen() {
        document.getElementById("authScreen").classList.remove("hidden");
        document.getElementById("mainApp").style.display = "none";
      }

      function showMainApp() {
        document.getElementById("authScreen").classList.add("hidden");
        document.getElementById("mainApp").style.display = "grid";
      }

      function switchTab(tabName) {
        currentTab = tabName;

        // Hide all views
        document
          .querySelectorAll(".feature-view")
          .forEach((v) => v.classList.remove("active"));

        // Show selected view
        document.getElementById(tabName + "View").classList.add("active");

        // Update tab buttons
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        // Show/hide chat input
        if (tabName === "chat") {
          document.getElementById("chatInputArea").style.display = "flex";
        } else {
          document.getElementById("chatInputArea").style.display = "none";
        }
      }

      function showAccountInfo() {
        if (currentUser) {
          document.getElementById("modalUsername").textContent =
            currentUser.username;
          document.getElementById("modalChatCount").textContent =
            currentUser.chats?.length || 0;
          document.getElementById("modalLoginTime").textContent =
            new Date().toLocaleString();
          document.getElementById("accountModal").classList.add("active");
        }
      }

      function closeAccountModal() {
        document.getElementById("accountModal").classList.remove("active");
      }

      // ═══════════════════════════════════════════════════════════════════════
      // CHAT MANAGEMENT
      // ═══════════════════════════════════════════════════════════════════════

      async function loadChatsList() {
        try {
          const response = await fetch("/api/chats", {
            headers: { Authorization: `Bearer ${sessionToken}` },
          });

          if (!response.ok) return;

          const data = await response.json();
          const chatsList = document.getElementById("chatsList");
          chatsList.innerHTML = "";

          if (data.chats.length === 0) {
            chatsList.innerHTML =
              '<p style="padding: var(--sp-4); color: var(--text-dim);">No chats yet</p>';
            return;
          }

          data.chats.forEach((chat) => {
            const item = document.createElement("div");
            item.className =
              "chat-item" + (chat.id === currentChatId ? " active" : "");
            item.innerHTML = `<strong>${escapeHtml(chat.title || "Untitled")}</strong><br><small>${chat.message_count || 0} messages</small>`;
            item.onclick = () => loadChat(chat.id);
            chatsList.appendChild(item);
          });
        } catch (error) {
          console.error("Error loading chats:", error);
        }
      }

      async function createNewChat() {
        try {
          const response = await fetch("/api/chats", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${sessionToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ title: new Date().toLocaleString() }),
          });

          if (!response.ok) return;

          const data = await response.json();
          currentChatId = data.chat_id;

          document.getElementById("chatMessages").innerHTML =
            '<div class="empty-state"><p>Start a conversation</p></div>';
          loadChatsList();
          switchTab("chat");
        } catch (error) {
          console.error("Error creating chat:", error);
        }
      }

      async function loadChat(chatId) {
        try {
          const response = await fetch(`/api/chats/${chatId}`, {
            headers: { Authorization: `Bearer ${sessionToken}` },
          });

          if (!response.ok) return;

          const chat = await response.json();
          currentChatId = chatId;

          const messagesContainer = document.getElementById("chatMessages");
          messagesContainer.innerHTML = "";

          if (chat.messages.length === 0) {
            messagesContainer.innerHTML =
              '<div class="empty-state"><p>Start chatting</p></div>';
          } else {
            chat.messages.forEach((msg) => {
              const msgEl = createMessageElement(
                msg.role,
                msg.content,
                msg.timestamp,
              );
              messagesContainer.appendChild(msgEl);
            });
            messagesContainer.parentElement.scrollTop =
              messagesContainer.parentElement.scrollHeight;
          }

          loadChatsList();
        } catch (error) {
          console.error("Error loading chat:", error);
        }
      }

      function createMessageElement(role, content, timestamp) {
        const msgEl = document.createElement("div");
        msgEl.className = `message ${role}`;
        msgEl.innerHTML = `
          <div class="message-content">${escapeHtml(content)}</div>
          ${timestamp ? `<div class="message-time">${new Date(timestamp).toLocaleTimeString()}</div>` : ""}
        `;
        return msgEl;
      }

      function handleInputKeydown(event) {
        if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
          event.preventDefault();
          sendMessage();
        }
      }

      async function sendMessage() {
        const input = document.getElementById("chatInput");
        const message = input.value.trim();

        if (!message || !currentChatId) return;

        input.value = "";
        input.style.height = "auto";

        // Hide empty state
        const emptyState = document.querySelector(".empty-state");
        if (emptyState) emptyState.style.display = "none";

        // Add user message
        const messagesContainer = document.getElementById("chatMessages");
        const userMsgEl = createMessageElement("user", message);
        messagesContainer.appendChild(userMsgEl);
        messagesContainer.parentElement.scrollTop =
          messagesContainer.parentElement.scrollHeight;

        // Save user message
        try {
          await fetch(`/api/chats/${currentChatId}/messages`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${sessionToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ role: "user", content: message }),
          });
        } catch (error) {
          console.error("Error saving message:", error);
        }

        // Get AI response
        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              user_message: message,
              model: selectedModel,
              include_file: false,
            }),
          });

          if (response.ok) {
            const data = await response.json();
            const aiResponse =
              data.response || "I could not generate a response.";

            // Add AI response
            const aiMsgEl = createMessageElement("assistant", aiResponse);
            messagesContainer.appendChild(aiMsgEl);

            // Save AI response
            await fetch(`/api/chats/${currentChatId}/messages`, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${sessionToken}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ role: "assistant", content: aiResponse }),
            });

            messagesContainer.parentElement.scrollTop =
              messagesContainer.parentElement.scrollHeight;

            if (voiceReplyEnabled) {
              speakAssistantReply(aiResponse);
            }
          }
        } catch (error) {
          console.error("Error getting AI response:", error);
        }
      }

      // ═══════════════════════════════════════════════════════════════════════
      // FEATURE IMPLEMENTATIONS
      // ═══════════════════════════════════════════════════════════════════════

      async function performSearch() {
        const query = document.getElementById("searchQuery").value;
        if (!query) return;

        const resultsDiv = document.getElementById("searchResults");
        resultsDiv.innerHTML = "<p>Searching...</p>";

        try {
          const response = await fetch("/api/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query }),
          });

          if (response.ok) {
            const data = await response.json();
            resultsDiv.innerHTML =
              "<h3>Results:</h3>" +
              (data.results
                ?.map(
                  (r) =>
                    `<div class="news-item"><strong>${r.title}</strong><p>${r.snippet}</p><a href="${r.link}" target="_blank">Read more</a></div>`,
                )
                .join("") || "<p>No results found</p>");
          }
        } catch (error) {
          resultsDiv.innerHTML = "<p>Search error</p>";
        }
      }

      function addTodo() {
        const input = document.getElementById("todoInput");
        const text = input.value.trim();
        if (!text) return;

        fetch("/api/todo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ task: text }),
        }).then(() => {
          input.value = "";
          loadTodos();
        });
      }

      function loadTodos() {
        fetch("/api/todo")
          .then((r) => r.json())
          .then((data) => {
            const todoList = document.getElementById("todoList");
            todoList.innerHTML = "";

            (data.todos || []).forEach((todo, idx) => {
              const item = document.createElement("div");
              item.className = "todo-item";
              item.innerHTML = `<span>${escapeHtml(todo)}</span><button onclick="deleteTodo(${idx})">✕</button>`;
              todoList.appendChild(item);
            });
          });
      }

      function deleteTodo(index) {
        fetch("/api/todo", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ index }),
        }).then(() => loadTodos());
      }

      function saveNote() {
        const title = document.getElementById("noteTitle").value;
        const content = document.getElementById("noteContent").value;

        if (!title || !content) return;

        fetch("/api/notes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, content }),
        }).then(() => {
          document.getElementById("noteTitle").value = "";
          document.getElementById("noteContent").value = "";
          loadNotes();
        });
      }

      function loadNotes() {
        fetch("/api/notes")
          .then((r) => r.json())
          .then((data) => {
            const notesList = document.getElementById("notesList");
            notesList.innerHTML = "";

            (data.notes || []).forEach((note) => {
              const item = document.createElement("div");
              item.className = "note-item";
              item.innerHTML = `<strong>${escapeHtml(note.title)}</strong><p>${escapeHtml(note.content.substring(0, 100))}...</p>`;
              notesList.appendChild(item);
            });
          });
      }

      async function lookupMedical() {
        const query = document.getElementById("medicalQuery").value;
        if (!query) return;

        const resultsDiv = document.getElementById("medicalResults");
        resultsDiv.innerHTML = "<p>Looking up...</p>";

        try {
          const response = await fetch("/api/medical", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ condition: query }),
          });

          if (response.ok) {
            const data = await response.json();
            resultsDiv.innerHTML =
              "<h3>Information:</h3><p>" +
              escapeHtml(data.analysis || "No information available") +
              "</p>";
          }
        } catch (error) {
          resultsDiv.innerHTML = "<p>Error fetching medical information</p>";
        }
      }

      async function generateDeca() {
        const contentDiv = document.getElementById("decaContent");
        contentDiv.innerHTML = "<p>Generating question...</p>";

        try {
          const response = await fetch("/api/deca", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "generate" }),
          });

          if (response.ok) {
            const data = await response.json();
            contentDiv.innerHTML =
              `<div class="todo-item"><strong>Question:</strong><p>${escapeHtml(data.question || "No question")}</p></div>` +
              `<textarea id="decaAnswer" placeholder="Your answer..." style="width: 100%; height: 200px; padding: var(--sp-3); border: var(--border-w) solid var(--border);"></textarea>` +
              `<button class="btn" onclick="submitDecaAnswer()">Submit Answer</button>`;
          }
        } catch (error) {
          contentDiv.innerHTML = "<p>Error generating DECA question</p>";
        }
      }

      function submitDecaAnswer() {
        const answer = document.getElementById("decaAnswer").value;
        alert("Answer submitted: " + answer);
      }

      async function loadDecaSample() {
        const contentDiv = document.getElementById("decaContent");
        contentDiv.innerHTML = "<p>Loading sample...</p>";

        try {
          const response = await fetch("/api/deca", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "sample" }),
          });

          if (response.ok) {
            const data = await response.json();
            contentDiv.innerHTML =
              '<div class="todo-item"><p>' +
              escapeHtml(data.sample || "No sample available") +
              "</p></div>";
          }
        } catch (error) {
          contentDiv.innerHTML = "<p>Error loading sample</p>";
        }
      }

      async function loadNews() {
        const newsList = document.getElementById("newsList");
        newsList.innerHTML = "<p>Loading news...</p>";

        try {
          const response = await fetch("/api/news");

          if (response.ok) {
            const data = await response.json();
            newsList.innerHTML = (data.news || [])
              .map(
                (item) =>
                  `<div class="news-item"><strong>${escapeHtml(item.title)}</strong><p>${escapeHtml(item.snippet || item.description)}</p></div>`,
              )
              .join("");
          }
        } catch (error) {
          newsList.innerHTML = "<p>Error loading news</p>";
        }
      }

      // ═══════════════════════════════════════════════════════════════════════
      // UTILITIES
      // ═══════════════════════════════════════════════════════════════════════

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }

      // Textarea auto-expand
      document.addEventListener("DOMContentLoaded", () => {
        const textarea = document.getElementById("chatInput");
        textarea?.addEventListener("input", () => {
          textarea.style.height = "auto";
          const newHeight = Math.min(textarea.scrollHeight, 80);
          textarea.style.height = newHeight + "px";
        });
      });

      function handleFileSelect(event) {
        console.log("File selected:", event.target.files[0]);
      }

      function removeAttachedFile() {}

      function toggleVoiceInput() {
        alert("Voice input not yet implemented");
      }

      function toggleVoiceOutput() {
        voiceReplyEnabled = !voiceReplyEnabled;
        document.getElementById("voiceReplyToggle").classList.toggle("active");
      }

      function speakAssistantReply(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
      }

      // Load initial data
      loadTodos();
      loadNotes();
    </script>
  </body>
</html>
